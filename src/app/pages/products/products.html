<div class="dashboard">

  <header class="header">
    <h1>📂 Products Dashboard</h1>
  </header>

  <div class="stats">
    <div class="card">
      <h3>Total Products</h3>
      <p>{{ products.length }}</p>
    </div>
    <div class="card">
      <h3>Status</h3>
      <p>Online</p>
    </div>
  </div>

  <div class="form-box">
    <h2>{{ editingId ? 'Update Product' : 'Add Product' }}</h2>

    <div style="display: flex; flex-direction: column; gap: 12px; width: 100%; margin-bottom: 15px;">
      <input
        type="text"
        placeholder="Product Name"
        [(ngModel)]="currentProduct.title">

      <input
        type="number"
        placeholder="Price ($)"
        [(ngModel)]="currentProduct.price">

      <select [(ngModel)]="currentProduct.category" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; background: white;">
        <option value="" disabled selected>Select Category</option>
        <option value="MEN">MEN</option>
        <option value="WOMEN">WOMEN</option>
        <option value="KIDS">KIDS</option>
      </select>

      <div style="display: flex; flex-direction: column; gap: 5px;">
        <label style="font-size: 13px; font-weight: 600; color: #475569;">Product Image</label>
        <input 
          type="file" 
          accept="image/*"
          (change)="onFileSelected($event)"
          style="padding: 8px; border: 1px dashed #cbd5e1; border-radius: 6px; background: #f8fafc; cursor: pointer;">
        
        <div *ngIf="currentProduct.image || currentProduct.imageUrl" style="margin-top: 5px;">
          <img [src]="currentProduct.image || currentProduct.imageUrl" style="height: 60px; border-radius: 4px; object-fit: cover; border: 1px solid #e2e8f0;">
        </div>
      </div>

      <textarea
        placeholder="Description"
        rows="2"
        [(ngModel)]="currentProduct.description"
        style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit;"></textarea>
    </div>

    <button
      *ngIf="!editingId"
      class="add-btn"
      (click)="saveProduct()">
      Add Product
    </button>

    <div *ngIf="editingId" style="display: flex; gap: 10px; width: 100%;">
      <button
        class="update-btn"
        style="flex: 1; padding: 10px; background-color: #10b981; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;"
        (click)="saveProduct()">
        Update Product
      </button>
      <button
        type="button"
        style="padding: 10px; background: #64748b; color: white; border: none; border-radius: 5px; cursor: pointer;"
        (click)="resetForm()">
        Cancel
      </button>
    </div>
  </div>

  <h2 class="title">Products List</h2>

  <div class="products">
    <div class="product-card" *ngFor="let prod of products">
      
      <img 
        *ngIf="prod.image || prod.imageUrl" 
        [src]="prod.image || prod.imageUrl" 
        alt="product" 
        style="width: 100%; height: 130px; object-fit: cover; border-radius: 6px; margin-bottom: 10px;">
      
      <h3>{{ prod.title || prod.name }}</h3>
      <p style="margin: 5px 0; font-weight: bold; color: #22c55e;">${{ prod.price }}</p>
      <span style="font-size: 11px; background: #f1f5f9; padding: 2px 8px; border-radius: 10px; color: #64748b; display: inline-block; margin-bottom: 10px;">{{ prod.category }}</span>

      <div class="actions">
        <button class="edit-btn" (click)="editProduct(prod)">Edit</button>
        <button class="delete-btn" (click)="deleteProduct(prod.id!)">Delete</button>
      </div>

    </div>

    <div *ngIf="products.length === 0" style="grid-column: 1/-1; text-align: center; color: #64748b; padding: 20px;">
      No products in store. Add your first product above!
    </div>
  </div>

</div>
